name: Regenerate site data

# When any itinerary Markdown (or the generator) changes on main, rebuild
# docs/data.js and commit it back so the repo's generated data stays in sync.
on:
  push:
    branches: [main]
    paths:
      - 'itinerary.md'
      - 'passes.md'
      - 'days/*.md'
      - 'generate_site_data.py'

permissions:
  contents: write

concurrency:
  group: regen-data
  cancel-in-progress: false

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Regenerate docs/data.js
        run: python generate_site_data.py

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain docs/data.js)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/data.js
            git commit -m "chore: regenerate docs/data.js from Markdown"
            git push
          else
            echo "docs/data.js already up to date — nothing to commit."
          fi
